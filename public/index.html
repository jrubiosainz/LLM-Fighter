<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM FIGHTER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="scanlines"></div>
    
    <div class="game-container">
        <div class="game-main">
            <div class="game-stage">
                <canvas id="gameCanvas"></canvas>
            </div>
            <div class="thought-strip">
                <aside class="thought-panel left-panel" id="leftPanel">
                    <span class="panel-model" id="leftModel">---</span>
                    <div class="panel-thought" id="leftThought">
                        <p>Awaiting selection...</p>
                    </div>
                </aside>
                <aside class="thought-panel right-panel" id="rightPanel">
                    <span class="panel-model" id="rightModel">---</span>
                    <div class="panel-thought" id="rightThought">
                        <p>Awaiting selection...</p>
                    </div>
                </aside>
            </div>
        </div>
        <footer class="game-footer">
            <button id="selectBtn" class="arcade-btn">SELECT MODELS</button>
            <button id="fightBtn" class="arcade-btn" disabled>FIGHT!</button>
        </footer>
    </div>

    <script src="js/engine.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/ai-controller.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
