<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM FIGHTER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="scanlines"></div>
    
    <div class="game-container">
        <header class="game-header">
            <h1 class="game-title">LLM FIGHTER</h1>
            <p class="game-subtitle">AI MODELS CLASH</p>
        </header>

        <div class="game-main">
            <aside class="thought-panel left-panel" id="leftPanel">
                <div class="panel-header">P1</div>
                <div class="panel-model" id="leftModel">---</div>
                <div class="panel-label">THINKING:</div>
                <div class="panel-thought" id="leftThought">
                    <p>Awaiting selection...</p>
                </div>
            </aside>

            <div class="game-stage">
                <canvas id="gameCanvas" width="800" height="450"></canvas>
            </div>

            <aside class="thought-panel right-panel" id="rightPanel">
                <div class="panel-header">P2</div>
                <div class="panel-model" id="rightModel">---</div>
                <div class="panel-label">THINKING:</div>
                <div class="panel-thought" id="rightThought">
                    <p>Awaiting selection...</p>
                </div>
            </aside>
        </div>

        <footer class="game-footer">
            <button id="selectBtn" class="arcade-btn">SELECT MODELS</button>
            <button id="fightBtn" class="arcade-btn" disabled>FIGHT!</button>
        </footer>
    </div>

    <script src="js/engine.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/ai-controller.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
